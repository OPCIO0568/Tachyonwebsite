ction class="section"> <div class="container"> <h1 class="section-title">Introduce</h1> <p>소개 정보를 불러오는 중입니다.</p> </div> </section> </div> <script>(function(){const fallbackIntroData = {"title":"동아리 소개","description":"동아리 소개 및 수상 내역","sections":[{"heading":"Introduce","paragraphs":["Tachyon은 충북대학교 자작 포뮬러 팀입니다. 우리는 오픈휠 레이스카를 직접 설계하고 제작하며, 테스트와 대회 운영까지 전 과정을 스스로 완성합니다. 강의실의 이론을 실제 차량으로 구현하는 것이 우리의 방식입니다."]},{"heading":"What We Do","paragraphs":["Tachyon은 Formula SAE Korea 및 Formula Student 규정에 맞는 차량을 목표로 설계, 제작, 시험을 반복합니다. 팀원들은 구조 설계, 동력계, 공력, 섀시, 전장, 운영까지 다양한 역할을 맡아 실제 산업 환경에 가까운 프로젝트 경험을 쌓습니다.","우리는 단순히 차량을 만드는 것을 넘어, 데이터 기반의 개선과 설계 의사결정을 통해 완성도를 높이고 새로운 아이디어를 실험합니다."]},{"heading":"Competition","paragraphs":["Formula SAE Korea 는 한국의 대학생들이 참여하는 공학 설계 경진대회입니다. 정적(Static) 평가에서는 설계 리뷰, 원가 분석, 비즈니스 발표를 통해 차량의 완성도와 설득력을 평가받습니다. 동적(Dynamic) 평가에서는 가속, 스키드패드, 오토크로스, 내구 주행 등 실제 주행 성능으로 점수를 얻습니다.","모든 차량은 기술 검사와 안전성 테스트를 통과해야 하며, 팀의 준비성과 협업 능력은 경기 결과를 좌우합니다. 대회 정보는 공식 웹사이트에서 확인할 수 있습니다.","https://www.ksae.org/jajak/"]}],"organization":{"title":"Organization","image":"/images/organization.png","alt":"Team Organization Chart"}};

    const app = document.getElementById("intro-app");

    const escapeHtml = (value) =>
      String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

    const normalizeIntro = (data) => ({
      title: data?.title || "동아리 소개",
      description: data?.description || "",
      sections: Array.isArray(data?.sections) ? data.sections : [],
      organization: {
        title: data?.organization?.title || "Organization",
        image: data?.organization?.image || "",
        alt: data?.organization?.alt || "Team Organization Chart",
      },
    });

    const paragraphHtml = (text) => {
      const value = String(text || "").trim();
      if (/^https?:\/\//.test(value)) {
        return `<p><a href="${escapeHtml(value)}">${escapeHtml(value)}</a></p>`;
      }
      return `<p>${escapeHtml(value)}</p>`;
    };

    const sectionHtml = (section, index) => {
      const titleTag = index === 0 ? "h1" : "h2";
      return `
        <section class="section">
          <div class="container">
            <${titleTag} class="section-title">${escapeHtml(section.heading)}</${titleTag}>
            ${(section.paragraphs || []).map(paragraphHtml).join("")}
          </div>
        </section>
      `;
    };

    const render = (data) => {
      const intro = normalizeIntro(data);
      document.title = intro.title;
      document.querySelector('meta[name="description"]')?.setAttribute("content", intro.description);

      const organization = intro.organization.image
        ? `
          <section class="section">
            <div class="container">
              <h2 class="section-title">${escapeHtml(intro.organization.title)}</h2>
              <div class="org-chart">
                <img src="${escapeHtml(intro.organization.image)}" alt="${escapeHtml(intro.organization.alt)}">
              </div>
            </div>
          </section>
        `
        : "";

      app.innerHTML = `${intro.sections.map(sectionHtml).join("")}${organization}`;
    };

    const loadIntro = async () => {
      try {
        const response = await fetch("/api/intro", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Failed to load intro");
        }
        return await response.json();
      } catch {
        return fallbackIntroData;
      }
    };

    loadIntro().then(render).catch(() => render(fallbackIntroData));
  })();</script>  </main> <footer class="site-footer"> <div class="container footer-inner"> <span>ⓒ 2026 Tachyon</span> <div class="footer-social"> <a href="https://www.instagram.com/cbnu_tachyon/"> <svg viewBox="0 0 24 24" aria-hidden="true"> <path d="M7.5 2C4.462 2 2 4.462 2 7.5v9C2 19.538 4.462 22 7.5 22h9c3.038 0 5.5-2.462 5.5-5.5v-9C22 4.462 19.538 2 16.5 2h-9zm0 2h9C18.43 4 20 5.57 20 7.5v9c0 1.93-1.57 3.5-3.5 3.5h-9C5.57 20 4 18.43 4 16.5v-9C4 5.57 5.57 4 7.5 4zm9.25 2a1.25 1.25 0 100 2.5 1.25 1.25 0 000-2.5zM12 7a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6z"></path> </svg>
