<!DOCTYPE html><html lang="ko"> <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="description" content="Tachyon 연락처와 소셜 링크"><meta name="robots" content="index, follow"><link rel="canonical" href="https://tachyon.cbnu.ac.kr/contact/"><link rel="icon" type="image/svg+xml" href="/images/tachyon-logo-link.png"><meta property="og:site_name" content="Tachyon"><meta property="og:type" content="website"><meta property="og:title" content="Contact Us | Tachyon"><meta property="og:description" content="Tachyon 연락처와 소셜 링크"><meta property="og:url" content="https://tachyon.cbnu.ac.kr/contact/"><meta property="og:image" content="https://tachyon.cbnu.ac.kr/images/tachyon-logo-link.png"><title>Contact Us | Tachyon</title><link rel="stylesheet" href="/_astro/admin.Cgelo6nI.css"></head> <body> <header class="site-header"> <div class="container header-inner"> <a class="brand" href="/"> <img class="brand-logo" src="/images/tachyon-logo2.png" alt="Tachyon logo"> <span>Tachyon</span> </a> <div class="header-actions"> <nav class="nav-links"> <a href="/">Home</a> <a href="/intro">About US</a> <a href="/history">Our Cars</a> <a href="/members">Members</a> <a href="/gallery">Gallery</a> <a href="/sponsors">Sponsors</a> <a href="/contact">Contact US</a>  </nav> </div> </div> </header> <main>  <section class="section"> <div class="container" id="contact-app"> <h1 class="section-title">Contact Us</h1> <p>연락처 정보를 불러오는 중입니다.</p> </div> </section> <script>(function(){const fallbackContactData = {"title":"Contact Us","subtitle":"","heroImage":"/images/banner.jpg","serverAdmin":{"role":"Server Admin","name":"TACHYON Website Admin","email":"tachyon@example.com"},"contacts":[{"role":"회장","name":"조진우","phone":"010-3563-6742","email":"whwls10@naver.com"},{"role":"PM","name":"이정윤","phone":"010-2942-2910","email":"babitu@naver.com"},{"role":"마케팅 매니저","name":"고동현","phone":"010-0000-0000","email":"tachyon@example.com"}],"socials":[{"name":"Instagram","url":"https://www.instagram.com/cbnu_tachyon/","image":"/images/photo/img3.jpg"},{"name":"YouTube","url":"http://www.youtube.com/@CBNUTACHYON/","image":"/images/photo/img4.jpg"},{"name":"Naver Cafe","url":"https://cafe.naver.com/tachyonformula/","image":"/images/photo/img5.jpg"}]};

    const app = document.getElementById("contact-app");

    const escapeHtml = (value) =>
      String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

    const normalizeContact = (data) => ({
      title: data?.title || "Contact Us",
      subtitle: data?.subtitle || "",
      heroImage: data?.heroImage || "",
      serverAdmin: {
        role: data?.serverAdmin?.role || "Server Admin",
        name: data?.serverAdmin?.name || "",
        email: data?.serverAdmin?.email || "",
      },
      contacts: Array.isArray(data?.contacts) ? data.contacts : [],
      socials: Array.isArray(data?.socials) ? data.socials : [],
    });

    const contactCard = (contact) => {
      const phone = contact.phone
        ? `<p class="contact-info-detail">${escapeHtml(contact.phone)}</p>`
        : "";
      const email = contact.email
        ? `<p class="contact-info-detail"><a href="mailto:${escapeHtml(contact.email)}">${escapeHtml(contact.email)}</a></p>`
        : "";

      return `
        <div class="contact-info-card">
          <h3>${escapeHtml(contact.role)}</h3>
          <p class="contact-info-name">${escapeHtml(contact.name)}</p>
          ${phone}
          ${email}
        </div>
      `;
    };

    const socialCard = (social) => `
      <a class="contact-social-card" href="${escapeHtml(social.url || "#")}">
        ${social.image ? `<img src="${escapeHtml(social.image)}" alt="${escapeHtml(social.name)}">` : ""}
        <span>${escapeHtml(social.name)}</span>
      </a>
    `;

    const serverAdminBlock = (admin) => {
      if (!admin.name && !admin.email) {
        return "";
      }

      return `
        <div class="contact-server-admin">
          <span>${escapeHtml(admin.role || "Server Admin")}</span>
          ${admin.name ? `<span>${escapeHtml(admin.name)}</span>` : ""}
          ${admin.email ? `<a href="mailto:${escapeHtml(admin.email)}">${escapeHtml(admin.email)}</a>` : ""}
        </div>
      `;
    };

    const render = (data) => {
      const contact = normalizeContact(data);
      const subtitle = contact.subtitle ? `<p class="section-subtitle">${escapeHtml(contact.subtitle)}</p>` : "";
      const hero = contact.heroImage
        ? `
          <div class="contact-hero">
            <img src="${escapeHtml(contact.heroImage)}" alt="Tachyon Team">
          </div>
        `
        : "";

      app.innerHTML = `
        <h1 class="section-title">${escapeHtml(contact.title)}</h1>
        ${subtitle}
        ${hero}
        <div class="contact-info-grid">${contact.contacts.map(contactCard).join("")}</div>
        <div class="contact-social-grid">${contact.socials.map(socialCard).join("")}</div>
        ${serverAdminBlock(contact.serverAdmin)}
      `;
    };

    const loadContact = async () => {
      try {
        const response = await fetch("/api/contact", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Failed to load contact");
        }
        return await response.json();
      } catch {
        return fallbackContactData;
      }
    };

    loadContact()
      .then(render)
      .catch(() => {
        app.innerHTML = `
          <h1 class="section-title">Contact Us</h1>
          <p>연락처 정보를 표시하지 못했습니다. 데이터 형식을 확인해주세요.</p>
        `;
      });
  })();</script>  </main> <footer class="site-footer"> <div class="container footer-inner"> <span>ⓒ 2026 Tachyon</span> <div class="footer-social"> <a href="https://www.instagram.com/cbnu_tachyon/"> <svg viewBox="0 0 24 24" aria-hidden="true"> <path d="M7.5 2C4.462 2 2 4.462 2 7.5v9C2 19.538 4.462 22 7.5 22h9c3.038 0 5.5-2.462 5.5-5.5v-9C22 4.462 19.538 2 16.5 2h-9zm0 2h9C18.43 4 20 5.57 20 7.5v9c0 1.93-1.57 3.5-3.5 3.5h-9C5.57 20 4 18.43 4 16.5v-9C4 5.57 5.57 4 7.5 4zm9.25 2a1.25 1.25 0 100 2.5 1.25 1.25 0 000-2.5zM12 7a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6z"></path> </svg>
