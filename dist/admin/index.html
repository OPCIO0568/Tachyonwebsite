<!DOCTYPE html><html lang="ko"> <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="description" content="Tachyon 관리자 페이지"><link rel="icon" type="image/svg+xml" href="/images/tachyon-logo-link.png"><title>Tachyon Admin</title><link rel="stylesheet" href="/_astro/admin.Dhfe7y8M.css"></head> <body> <header class="site-header"> <div class="container header-inner"> <a class="brand" href="/"> <img class="brand-logo" src="/images/tachyon-logo2.png" alt="Tachyon logo"> <span>Tachyon</span> </a> <div class="header-actions"> <nav class="nav-links"> <a href="/">Home</a> <a href="/intro">About US</a> <a href="/history">Our Cars</a> <a href="/members">Members</a> <a href="/sponsors">Sponsors</a> <a href="/contact">Contact US</a>  </nav> </div> </div> </header> <main>  <section class="section"> <div class="container"> <h1 class="section-title">Admin</h1> <div id="admin-login" class="admin-panel"> <form id="login-form" class="admin-form"> <label class="admin-field"> <span>비밀번호</span> <input id="admin-password" type="password" autocomplete="current-password" required> </label> <button class="admin-button admin-button-primary" type="submit">로그인</button> </form> </div> <p id="admin-status" class="admin-status" aria-live="polite"></p> <div id="admin-pages" class="admin-shell" hidden> <div class="admin-toolbar"> <h2 class="admin-heading">Pages</h2> <button class="admin-button" type="button" data-action="logout">로그아웃</button> </div> <div id="admin-page-grid" class="admin-page-grid"></div> <form id="admin-password-form" class="admin-subpanel admin-password-form"> <div class="admin-subpanel-header"> <h3>비밀번호 변경</h3> </div> <div class="admin-form-grid"> <label class="admin-field"> <span>현재 비밀번호</span> <input id="current-password" type="password" autocomplete="current-password" required> </label> <label class="admin-field"> <span>새 비밀번호</span> <input id="new-password" type="password" autocomplete="new-password" minlength="8" required> </label> <label class="admin-field"> <span>새 비밀번호 확인</span> <input id="confirm-password" type="password" autocomplete="new-password" minlength="8" required> </label> </div> <div> <button class="admin-button admin-button-primary" type="submit">비밀번호 변경</button> </div> </form> <div class="admin-subpanel admin-visit-panel"> <div class="admin-subpanel-header"> <h3>조회수 통계</h3> <label class="admin-field admin-field-inline"> <span>페이지</span> <select id="admin-visit-page-select"></select> </label> </div> <div id="admin-visit-summary" class="admin-visit-summary"></div> <div id="admin-visit-chart" class="admin-visit-chart"></div> </div> </div> <div id="admin-editor" class="admin-shell" hidden> <div class="admin-toolbar"> <button class="admin-button" type="button" data-action="back-pages">페이지 목록</button> <h2 id="admin-editor-title" class="admin-heading">Members</h2> <label id="members-item-field" class="admin-field admin-field-inline"> <span>항목</span> <select id="season-select"></select> </label> <button id="add-season-button" class="admin-button" type="button" data-action="add-season">시즌 추가</button> <button class="admin-button admin-button-primary" type="button" data-action="save">저장</button> <button class="admin-button" type="button" data-action="logout">로그아웃</button> </div> <div id="season-editor"></div> </div> </div> </section> <script>
    const loginPanel = document.getElementById("admin-login");
    const loginForm = document.getElementById("login-form");
    const passwordInput = document.getElementById("admin-password");
    const adminPages = document.getElementById("admin-pages");
    const adminVisitSummary = document.getElementById("admin-visit-summary");
    const adminVisitPageSelect = document.getElementById("admin-visit-page-select");
    const adminVisitChart = document.getElementById("admin-visit-chart");
    const adminPageGrid = document.getElementById("admin-page-grid");
    const adminPasswordForm = document.getElementById("admin-password-form");
    const currentPasswordInput = document.getElementById("current-password");
    const newPasswordInput = document.getElementById("new-password");
    const confirmPasswordInput = document.getElementById("confirm-password");
    const adminEditor = document.getElementById("admin-editor");
    const adminEditorTitle = document.getElementById("admin-editor-title");
    const membersItemField = document.getElementById("members-item-field");
    const addSeasonButton = document.getElementById("add-season-button");
    const seasonSelect = document.getElementById("season-select");
    const seasonEditor = document.getElementById("season-editor");
    const statusEl = document.getElementById("admin-status");

    let membersData = null;
    let homeData = null;
    let introData = null;
    let historyData = null;
    let sponsorsData = null;
    let contactData = null;
    let visitsData = { total: 0, pages: {}, days: {}, updatedAt: "" };
    let sitePages = [];
    let activeEditor = "";
    let selectedYear = "";
    let selectedVisitRoute = "all";

    const defaultPhoto = "/images/profile/unprofile.jpg";

    const escapeHtml = (value) =>
      String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

    const setStatus = (message, type = "") => {
      statusEl.textContent = message;
      statusEl.dataset.type = type;
    };

    const requestJson = async (url, options = {}) => {
      const response = await fetch(url, {
        credentials: "same-origin",
        ...options,
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || "요청을 처리하지 못했습니다.");
      }
      return data;
    };

    const normalizeMember = (member = {}) => ({
      name: member.name || "",
      role: member.role || "",
      email: member.email || "",
      photo: member.photo || defaultPhoto,
    });

    const normalizeGroup = (group = {}) => ({
      title: group.title || "",
      members: Array.isArray(group.members) ? group.members.map(normalizeMember) : [],
    });

    const normalizeSection = (section = {}) => ({
      title: section.title || "",
      groups: Array.isArray(section.groups) ? section.groups.map(normalizeGroup) : [],
    });

    const normalizeSeason = (season = {}) => ({
      year: String(season.year || ""),
      title: season.title || "",
      subtitle: season.subtitle || "",
      teamPhotos: Array.isArray(season.teamPhotos) ? season.teamPhotos : [],
      sections: Array.isArray(season.sections) ? season.sections.map(normalizeSection) : [],
    });

    const normalizeArchive = (archive = {}) => ({
      title: archive.title || "Members Archive",
      subtitle: archive.subtitle || "",
      groups: Array.isArray(archive.groups)
        ? archive.groups.map((group) => ({
            label: group.label || "",
            photos: Array.isArray(group.photos) ? group.photos : [],
          }))
        : [],
    });

    const normalizeOb = (ob = {}) => ({
      title: ob.title || "OB Members",
      subtitle: ob.subtitle || "",
      teamPhotos: Array.isArray(ob.teamPhotos) ? ob.teamPhotos : [],
      members: Array.isArray(ob.members) ? ob.members.map(normalizeMember) : [],
    });

    const normalizeData = (data = {}) => ({
      seasons: Array.isArray(data.seasons) ? data.seasons.map(normalizeSeason) : [],
      archive: normalizeArchive(data.archive),
      ob: normalizeOb(data.ob),
    });

    const normalizePage = (page = {}) => ({
      name: page.name || "",
      route: page.route || "",
      file: page.file || "",
      editor: page.editor || "",
    });

    const normalizeHomeCard = (card = {}) => ({
      label: card.label || "",
      href: card.href || "",
      image: card.image || "",
      alt: card.alt || "",
    });

    const normalizeHomePhoto = (photo = {}) => ({
      href: photo.href || "",
      image: photo.image || "",
      alt: photo.alt || "",
    });

    const normalizeHomeLink = (link = {}) => ({
      label: link.label || "",
      href: link.href || "",
    });

    const normalizeHomeData = (data = {}) => ({
      title: data.title || "Tachyon",
      description: data.description || "",
      hero: {
        lightImage: data.hero?.lightImage || "",
        darkImage: data.hero?.darkImage || "",
        alt: data.hero?.alt || "",
        title: data.hero?.title || "",
        lead: data.hero?.lead || "",
      },
      cards: Array.isArray(data.cards) ? data.cards.map(normalizeHomeCard) : [],
      contact: {
        title: data.contact?.title || "With US",
        photos: Array.isArray(data.contact?.photos) ? data.contact.photos.map(normalizeHomePhoto) : [],
        links: Array.isArray(data.contact?.links) ? data.contact.links.map(normalizeHomeLink) : [],
      },
    });

    const normalizeIntroSection = (section = {}) => ({
      heading: section.heading || "",
      paragraphs: Array.isArray(section.paragraphs) ? section.paragraphs : [],
    });

    const normalizeIntroData = (data = {}) => ({
      title: data.title || "동아리 소개",
      description: data.description || "",
      sections: Array.isArray(data.sections) ? data.sections.map(normalizeIntroSection) : [],
      organization: {
        title: data.organization?.title || "Organization",
        image: data.organization?.image || "",
        alt: data.organization?.alt || "",
      },
    });

    const normalizeHistoryVehicle = (vehicle = {}) => ({
      name: vehicle.name || "",
      year: vehicle.year || "",
      competition: vehicle.competition || "",
      award: vehicle.award || "",
      image: vehicle.image || "",
      alt: vehicle.alt || "",
    });

    const normalizeHistoryGroup = (group = {}) => ({
      title: group.title || "",
      vehicles: Array.isArray(group.vehicles) ? group.vehicles.map(normalizeHistoryVehicle) : [],
    });

    const normalizeHistoryAward = (award = {}) => ({
      year: award.year || "",
      competition: award.competition || "",
      vehicle: award.vehicle || "",
      result: award.result || "",
    });

    const normalizeHistoryData = (data = {}) => ({
      title: data.title || "Our Cars",
      description: data.description || "",
      vehicleSectionTitle: data.vehicleSectionTitle || "History",
      groups: Array.isArray(data.groups) ? data.groups.map(normalizeHistoryGroup) : [],
      awards: {
        title: data.awards?.title || "역대 수상 내역",
        items: Array.isArray(data.awards?.items) ? data.awards.items.map(normalizeHistoryAward) : [],
      },
    });

    const normalizeSponsor = (sponsor = {}) => ({
      name: sponsor.name || "",
      url: sponsor.url || "",
      logo: sponsor.logo || "",
    });

    const normalizeSponsorsData = (data = {}) => ({
      title: data.title || "Sponsors",
      description: data.description || "",
      heroImage: data.heroImage || "",
      items: Array.isArray(data.items) ? data.items.map(normalizeSponsor) : [],
    });

    const normalizeContactPerson = (person = {}) => ({
      role: person.role || "",
      name: person.name || "",
      phone: person.phone || "",
      email: person.email || "",
    });

    const normalizeContactSocial = (social = {}) => ({
      name: social.name || "",
      url: social.url || "",
      image: social.image || "",
    });

    const normalizeContactData = (data = {}) => ({
      title: data.title || "Contact Us",
      subtitle: data.subtitle || "",
      heroImage: data.heroImage || "",
      contacts: Array.isArray(data.contacts) ? data.contacts.map(normalizeContactPerson) : [],
      socials: Array.isArray(data.socials) ? data.socials.map(normalizeContactSocial) : [],
    });

    const normalizeVisitsData = (data = {}) => ({
      total: Number(data.total) || 0,
      pages: data.pages && typeof data.pages === "object" ? data.pages : {},
      days: data.days && typeof data.days === "object" ? data.days : {},
      updatedAt: data.updatedAt || "",
    });

    const formatCount = (value) => (Number(value) || 0).toLocaleString("ko-KR");

    const pageVisitCountFrom = (pages, route) => {
      if (route === "all") {
        return Object.values(pages).reduce((sum, count) => sum + (Number(count) || 0), 0);
      }
      if (route === "/members") {
        return Object.entries(pages).reduce(
          (sum, [path, count]) => sum + (path === "/members" || path.startsWith("/members/") ? Number(count) || 0 : 0),
          0,
        );
      }
      return Number(pages[route]) || 0;
    };

    const pageVisitCount = (route) => {
      if (route === "all") {
        return Number(visitsData.total) || pageVisitCountFrom(visitsData.pages, "all");
      }
      return pageVisitCountFrom(visitsData.pages, route);
    };

    const visitDayKey = (date) => {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    };

    const recentVisitDays = () => {
      const today = new Date();
      const dayMs = 24 * 60 * 60 * 1000;
      return Array.from({ length: 7 }, (_, index) => {
        const date = new Date(today.getTime() - (6 - index) * dayMs);
        return {
          key: visitDayKey(date),
          label: `${date.getMonth() + 1}/${date.getDate()}`,
        };
      });
    };

    const selectedVisitLabel = () => {
      if (selectedVisitRoute === "all") {
        return "전체 페이지";
      }
      return sitePages.find((page) => page.route === selectedVisitRoute)?.name || selectedVisitRoute;
    };

    const visitSeries = () =>
      recentVisitDays().map((day) => {
        const dayData = visitsData.days[day.key] || { total: 0, pages: {} };
        const count = selectedVisitRoute === "all" ? Number(dayData.total) || 0 : pageVisitCountFrom(dayData.pages || {}, selectedVisitRoute);
        return { ...day, count };
      });

    const renderVisitChart = () => {
      const series = visitSeries();
      const weekTotal = series.reduce((sum, day) => sum + day.count, 0);
      const maxCount = Math.max(1, ...series.map((day) => day.count));
      const total = pageVisitCount(selectedVisitRoute);
      const updated = visitsData.updatedAt ? new Date(visitsData.updatedAt).toLocaleString("ko-KR") : "기록 없음";
      const label = selectedVisitLabel();

      adminVisitSummary.innerHTML = `
        <span>${escapeHtml(label)} 총 조회수 <strong>${formatCount(total)}</strong></span>
        <span>최근 7일 <strong>${formatCount(weekTotal)}</strong></span>
        <span>최근 기록 ${escapeHtml(updated)}</span>
      `;

      adminVisitChart.innerHTML = series
        .map(
          (day) => `
            <div class="admin-visit-bar-row">
              <span class="admin-visit-day">${escapeHtml(day.label)}</span>
              <span class="admin-visit-bar-track">
                <span class="admin-visit-bar-fill" style="width: ${(day.count / maxCount) * 100}%"></span>
              </span>
              <span class="admin-visit-count">${formatCount(day.count)}</span>
            </div>
          `,
        )
        .join("");
    };

    const renderVisitPageSelect = () => {
      const routes = new Set(sitePages.map((page) => page.route));
      if (selectedVisitRoute !== "all" && !routes.has(selectedVisitRoute)) {
        selectedVisitRoute = "all";
      }

      adminVisitPageSelect.innerHTML = `
        <option value="all" ${selectedVisitRoute === "all" ? "selected" : ""}>전체 페이지</option>
        ${sitePages
          .map(
            (page) => `
              <option value="${escapeHtml(page.route)}" ${selectedVisitRoute === page.route ? "selected" : ""}>
                ${escapeHtml(page.name)} (${escapeHtml(page.route)})
              </option>
            `,
          )
          .join("")}
      `;
    };

    const setEditorChrome = (editor) => {
      activeEditor = editor;
      const isMembers = editor === "members";
      const titles = {
        members: "Members",
        home: "Home",
        "home-en": "Home EN",
        intro: "About US",
        "intro-en": "About US EN",
        history: "Our Cars",
        sponsors: "Sponsors",
        contact: "Contact US",
      };
      adminEditorTitle.textContent = titles[editor] || "Editor";
      membersItemField.hidden = !isMembers;
      addSeasonButton.hidden = !isMembers;
    };

    const renderPageList = () => {
      renderVisitPageSelect();
      renderVisitChart();
      adminPageGrid.innerHTML = sitePages
        .map((page) => {
          const editableClass = page.editor ? " is-editable" : "";
          const action = page.editor ? ` data-action="open-editor" data-editor="${escapeHtml(page.editor)}"` : "";
          const tag = page.editor ? "button" : "div";
          const type = page.editor ? ' type="button"' : "";
          const visits = pageVisitCount(page.route);

          return `
            <${tag} class="admin-page-card${editableClass}"${type}${action}>
              <span class="admin-page-name">${escapeHtml(page.name)}</span>
              <span class="admin-page-route">${escapeHtml(page.route)}</span>
              <span class="admin-page-visits">조회수 ${formatCount(visits)}</span>
              <span class="admin-page-file">${escapeHtml(page.file)}</span>
            </${tag}>
          `;
        })
        .join("");
    };

    const sortSeasons = () =>
      membersData.seasons.sort((a, b) => Number(b.year) - Number(a.year));

    const selectedKind = () => {
      if (selectedYear === "archive" || selectedYear === "ob") {
        return selectedYear;
      }
      return "season";
    };

    const selectedUploadBucket = () =>
      selectedYear.startsWith("season:") ? selectedYear.slice("season:".length) : selectedYear || "general";

    const currentSeason = () => {
      if (selectedKind() !== "season") {
        return null;
      }

      const selectedSeasonYear = selectedUploadBucket();
      const season = membersData.seasons.find((item) => item.year === selectedSeasonYear) || membersData.seasons[0];
      selectedYear = season ? `season:${season.year}` : "";
      return season;
    };

    const nextSeasonYear = () => {
      const years = membersData.seasons.map((season) => Number(season.year)).filter(Number.isFinite);
      return String((years.length ? Math.max(...years) : new Date().getFullYear()) + 1);
    };

    const renderSeasonOptions = () => {
      sortSeasons();
      const seasonOptions = membersData.seasons
        .map(
          (season) => `
            <option value="season:${escapeHtml(season.year)}" ${selectedYear === `season:${season.year}` ? "selected" : ""}>
              ${escapeHtml(season.year)}
            </option>
          `,
        )
        .join("");

      seasonSelect.innerHTML = `
        ${seasonOptions}
        <option value="archive" ${selectedYear === "archive" ? "selected" : ""}>Archive</option>
        <option value="ob" ${selectedYear === "ob" ? "selected" : ""}>OB</option>
      `;
    };

    const renderPhotoRows = (season) => {
      const rows = season.teamPhotos
        .map(
          (photo, index) => `
            <div class="admin-photo-row" data-team-photo>
              <input name="team-photo" value="${escapeHtml(photo)}" placeholder="/uploads/members/${escapeHtml(season.year)}/team.jpg" />
              <input type="file" accept="image/*" data-action="upload-team-photo" data-photo-index="${index}" />
              <button class="admin-icon-button" type="button" data-action="remove-team-photo" data-photo-index="${index}">삭제</button>
            </div>
          `,
        )
        .join("");

      return `
        <div class="admin-subpanel">
          <div class="admin-subpanel-header">
            <h3>대표 사진</h3>
            <button class="admin-button" type="button" data-action="add-team-photo">사진 추가</button>
          </div>
          <div class="admin-stack">${rows || '<p class="admin-empty">등록된 대표 사진이 없습니다.</p>'}</div>
        </div>
      `;
    };

    const renderMemberRows = (members, sectionIndex, groupIndex) =>
      members
        .map(
          (member, memberIndex) => `
            <div class="admin-member-row" data-member>
              <input name="member-name" value="${escapeHtml(member.name)}" placeholder="이름" />
              <input name="member-role" value="${escapeHtml(member.role)}" placeholder="역할" />
              <input name="member-email" value="${escapeHtml(member.email)}" placeholder="email@example.com" />
              <input name="member-photo" value="${escapeHtml(member.photo)}" placeholder="/uploads/members/${escapeHtml(selectedUploadBucket())}/profile.jpg" />
              <input type="file" accept="image/*" data-action="upload-member-photo" data-section-index="${sectionIndex}" data-group-index="${groupIndex}" data-member-index="${memberIndex}" />
              <button class="admin-icon-button" type="button" data-action="move-member-up" data-section-index="${sectionIndex}" data-group-index="${groupIndex}" data-member-index="${memberIndex}">위</button>
              <button class="admin-icon-button" type="button" data-action="move-member-down" data-section-index="${sectionIndex}" data-group-index="${groupIndex}" data-member-index="${memberIndex}">아래</button>
              <button class="admin-icon-button" type="button" data-action="remove-member" data-section-index="${sectionIndex}" data-group-index="${groupIndex}" data-member-index="${memberIndex}">삭제</button>
            </div>
          `,
        )
        .join("");

    const renderGroups = (section, sectionIndex) =>
      section.groups
        .map(
          (group, groupIndex) => `
            <div class="admin-group-block" data-group>
              <div class="admin-subpanel-header">
                <label class="admin-field">
                  <span>그룹명</span>
                  <input name="group-title" value="${escapeHtml(group.title)}" placeholder="Aero Body" />
                </label>
                <div class="admin-row-actions">
                  <button class="admin-icon-button" type="button" data-action="move-group-up" data-section-index="${sectionIndex}" data-group-index="${groupIndex}">위</button>
                  <button class="admin-icon-button" type="button" data-action="move-group-down" data-section-index="${sectionIndex}" data-group-index="${groupIndex}">아래</button>
                  <button class="admin-icon-button" type="button" data-action="remove-group" data-section-index="${sectionIndex}" data-group-index="${groupIndex}">삭제</button>
                </div>
              </div>
              <div class="admin-member-list" data-members>
                ${renderMemberRows(group.members, sectionIndex, groupIndex) || '<p class="admin-empty">등록된 멤버가 없습니다.</p>'}
              </div>
              <button class="admin-button" type="button" data-action="add-member" data-section-index="${sectionIndex}" data-group-index="${groupIndex}">멤버 추가</button>
            </div>
          `,
        )
        .join("");

    const renderSections = (season) =>
      season.sections
        .map(
          (section, sectionIndex) => `
            <div class="admin-section-block" data-section>
              <div class="admin-subpanel-header">
                <label class="admin-field">
                  <span>섹션명</span>
                  <input name="section-title" value="${escapeHtml(section.title)}" placeholder="Leadership" />
                </label>
                <div class="admin-row-actions">
                  <button class="admin-icon-button" type="button" data-action="move-section-up" data-section-index="${sectionIndex}">위</button>
                  <button class="admin-icon-button" type="button" data-action="move-section-down" data-section-index="${sectionIndex}">아래</button>
                  <button class="admin-icon-button" type="button" data-action="remove-section" data-section-index="${sectionIndex}">삭제</button>
                </div>
              </div>
              <div class="admin-groups" data-groups>${renderGroups(section, sectionIndex)}</div>
              <button class="admin-button" type="button" data-action="add-group" data-section-index="${sectionIndex}">그룹 추가</button>
            </div>
          `,
        )
        .join("");

    const renderObMemberRows = (members) =>
      members
        .map(
          (member, memberIndex) => `
            <div class="admin-member-row" data-ob-member>
              <input name="ob-member-name" value="${escapeHtml(member.name)}" placeholder="이름" />
              <input name="ob-member-role" value="${escapeHtml(member.role)}" placeholder="역할" />
              <input name="ob-member-email" value="${escapeHtml(member.email)}" placeholder="email@example.com" />
              <input name="ob-member-photo" value="${escapeHtml(member.photo)}" placeholder="/uploads/members/ob/profile.jpg" />
              <input type="file" accept="image/*" data-action="upload-ob-member-photo" data-member-index="${memberIndex}" />
              <button class="admin-icon-button" type="button" data-action="move-ob-member-up" data-member-index="${memberIndex}">위</button>
              <button class="admin-icon-button" type="button" data-action="move-ob-member-down" data-member-index="${memberIndex}">아래</button>
              <button class="admin-icon-button" type="button" data-action="remove-ob-member" data-member-index="${memberIndex}">삭제</button>
            </div>

        contactData.socials.push({ name: "", url: "", image: "" });
      }
      if (action === "remove-contact-social") {
        contactData.socials.splice(socialIndex, 1);
      }
      if (action === "move-contact-social-up") {
        swap(contactData.socials, socialIndex, socialIndex - 1);
      }
      if (action === "move-contact-social-down") {
        swap(contactData.socials, socialIndex, socialIndex + 1);
      }

      renderContactEditor();
      setStatus("");
    };

    const handleAction = async (actionEl) => {
      const action = actionEl.dataset.action;
      readCurrentEditorFromDom();

      if (action === "add-season") {
        const year = nextSeasonYear();
        membersData.seasons.unshift({
          year,
          title: `Members ${year}`,
          subtitle: `Tachyon Season ${year}.`,
          teamPhotos: [],
          sections: [],
        });
        selectedYear = `season:${year}`;
        renderEditor();
        setStatus("");
        return;
      }

      if (action === "save") {
        await saveData();
        return;
      }

      if (action === "back-pages") {
        adminEditor.hidden = true;
        adminPages.hidden = false;
        setStatus("");
        return;
      }

      if (action === "logout") {
        await requestJson("/api/admin/logout", { method: "POST" });
        adminEditor.hidden = true;
        adminPages.hidden = true;
        loginPanel.hidden = false;
        setStatus("");
        return;
      }

      if (selectedKind() === "archive") {
        const groupIndex = Number(actionEl.dataset.groupIndex);
        const photoIndex = Number(actionEl.dataset.photoIndex);

        if (action === "add-archive-group") {
          membersData.archive.groups.push({ label: "New Archive", photos: [] });
        }
        if (action === "remove-archive-group") {
          membersData.archive.groups.splice(groupIndex, 1);
        }
        if (action === "move-archive-group-up") {
          swap(membersData.archive.groups, groupIndex, groupIndex - 1);
        }
        if (action === "move-archive-group-down") {
          swap(membersData.archive.groups, groupIndex, groupIndex + 1);
        }
        if (action === "add-archive-photo") {
          membersData.archive.groups[groupIndex].photos.push("");
        }
        if (action === "remove-archive-photo") {
          membersData.archive.groups[groupIndex].photos.splice(photoIndex, 1);
        }

        renderEditor();
        setStatus("");
        return;
      }

      if (selectedKind() === "ob") {
        const memberIndex = Number(actionEl.dataset.memberIndex);
        const photoIndex = Number(actionEl.dataset.photoIndex);

        if (action === "add-team-photo") {
          membersData.ob.teamPhotos.push("");
        }
        if (action === "remove-team-photo") {
          membersData.ob.teamPhotos.splice(photoIndex, 1);
        }
        if (action === "add-ob-member") {
          membersData.ob.members.push({
            name: "",
            role: "OB",
            email: "",
            photo: defaultPhoto,
          });
        }
        if (action === "remove-ob-member") {
          membersData.ob.members.splice(memberIndex, 1);
        }
        if (action === "move-ob-member-up") {
          swap(membersData.ob.members, memberIndex, memberIndex - 1);
        }
        if (action === "move-ob-member-down") {
          swap(membersData.ob.members, memberIndex, memberIndex + 1);
        }

        renderEditor();
        setStatus("");
        return;
      }

      const season = currentSeason();
      if (!season) {
        return;
      }

      const sectionIndex = Number(actionEl.dataset.sectionIndex);
      const groupIndex = Number(actionEl.dataset.groupIndex);
      const memberIndex = Number(actionEl.dataset.memberIndex);
      const photoIndex = Number(actionEl.dataset.photoIndex);

      if (action === "add-team-photo") {
        season.teamPhotos.push("");
      }
      if (action === "remove-team-photo") {
        season.teamPhotos.splice(photoIndex, 1);
      }
      if (action === "add-section") {
        season.sections.push({ title: "New Section", groups: [] });
      }
      if (action === "remove-section") {
        season.sections.splice(sectionIndex, 1);
      }
      if (action === "move-section-up") {
        swap(season.sections, sectionIndex, sectionIndex - 1);
      }
      if (action === "move-section-down") {
        swap(season.sections, sectionIndex, sectionIndex + 1);
      }
      if (action === "add-group") {
        season.sections[sectionIndex].groups.push({ title: "New Group", members: [] });
      }
      if (action === "remove-group") {
        season.sections[sectionIndex].groups.splice(groupIndex, 1);
      }
      if (action === "move-group-up") {
        swap(season.sections[sectionIndex].groups, groupIndex, groupIndex - 1);
      }
      if (action === "move-group-down") {
        swap(season.sections[sectionIndex].groups, groupIndex, groupIndex + 1);
      }
      if (action === "add-member") {
        season.sections[sectionIndex].groups[groupIndex].members.push({
          name: "",
          role: "",
          email: "",
          photo: defaultPhoto,
        });
      }
      if (action === "remove-member") {
        season.sections[sectionIndex].groups[groupIndex].members.splice(memberIndex, 1);
      }
      if (action === "move-member-up") {
        swap(season.sections[sectionIndex].groups[groupIndex].members, memberIndex, memberIndex - 1);
      }
      if (action === "move-member-down") {
        swap(season.sections[sectionIndex].groups[groupIndex].members, memberIndex, memberIndex + 1);
      }

      renderEditor();
      setStatus("");
    };

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        await requestJson("/api/admin/login", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ password: passwordInput.value }),
        });
        passwordInput.value = "";
        await showPageList();
      } catch (error) {
        setStatus(error.message, "error");
      }
    });

    seasonSelect.addEventListener("change", () => {
      readCurrentEditorFromDom();
      selectedYear = seasonSelect.value;
      renderEditor();
      setStatus("");
    });

    adminVisitPageSelect.addEventListener("change", () => {
      selectedVisitRoute = adminVisitPageSelect.value;
      renderVisitChart();
      setStatus("");
    });

    adminPages.addEventListener("click", async (event) => {
      const actionEl = event.target.closest("[data-action]");
      if (!actionEl) {
        return;
      }

      try {
        if (actionEl.dataset.action === "open-editor" && actionEl.dataset.editor === "members") {
          await loadMembersEditor();
        }

        if (actionEl.dataset.action === "open-editor" && actionEl.dataset.editor === "home") {
          await loadHomeEditor();
        }

        if (actionEl.dataset.action === "open-editor" && actionEl.dataset.editor === "home-en") {
          await loadHomeEditor("home-en");
        }

        if (actionEl.dataset.action === "open-editor" && actionEl.dataset.editor === "intro") {
          await loadIntroEditor();
        }

        if (actionEl.dataset.action === "open-editor" && actionEl.dataset.editor === "intro-en") {
          await loadIntroEditor("intro-en");
        }

        if (actionEl.dataset.action === "open-editor" && actionEl.dataset.editor === "history") {
          await loadHistoryEditor();
        }

        if (actionEl.dataset.action === "open-editor" && actionEl.dataset.editor === "sponsors") {
          await loadSponsorsEditor();
        }

        if (actionEl.dataset.action === "open-editor" && actionEl.dataset.editor === "contact") {
          await loadContactEditor();
        }

        if (actionEl.dataset.action === "logout") {
          await requestJson("/api/admin/logout", { method: "POST" });
          adminPages.hidden = true;
          loginPanel.hidden = false;
          setStatus("");
        }
      } catch (error) {
        setStatus(error.message, "error");
      }
    });

    adminPasswordForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (newPasswordInput.value !== confirmPasswordInput.value) {
        setStatus("새 비밀번호 확인이 일치하지 않습니다.", "error");
        return;
      }

      try {
        await requestJson("/api/admin/change-password", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            currentPassword: currentPasswordInput.value,
            newPassword: newPasswordInput.value,
          }),
        });

        adminPasswordForm.reset();
        setStatus("비밀번호를 변경했습니다.", "success");
      } catch (error) {
        setStatus(error.message, "error");
      }
    });

    adminEditor.addEventListener("click", (event) => {
      const actionEl = event.target.closest("[data-action]");
      if (!actionEl || actionEl.type === "file") {
        return;
      }

      const action = actionEl.dataset.action;

      if (action === "save") {
        const save =
          activeEditor === "sponsors"
            ? saveSponsorsData
            : isHomeEditor()
              ? saveHomeData
            : isIntroEditor()
              ? saveIntroData
            : activeEditor === "history"
              ? saveHistoryData
            : activeEditor === "contact"
              ? saveContactData
              : saveData;
        save().catch((error) => setStatus(error.message, "error"));
        return;
      }

      if (action === "back-pages") {
        adminEditor.hidden = true;
        adminPages.hidden = false;
        setStatus("");
        return;
      }

      if (action === "logout") {
        requestJson("/api/admin/logout", { method: "POST" })
          .then(() => {
            adminEditor.hidden = true;
            adminPages.hidden = true;
            loginPanel.hidden = false;
            setStatus("");
          })
          .catch((error) => setStatus(error.message, "error"));
        return;
      }

      const handler =
        activeEditor === "sponsors"
          ? handleSponsorsAction
          : isHomeEditor()
            ? handleHomeAction
          : isIntroEditor()
            ? handleIntroAction
          : activeEditor === "history"
            ? handleHistoryAction
          : activeEditor === "contact"
            ? handleContactAction
            : handleAction;
      handler(actionEl).catch((error) => setStatus(error.message, "error"));
    });

    adminEditor.addEventListener("change", async (event) => {
      const fileInput = event.target.closest('input[type="file"][data-action]');
      if (!fileInput || !fileInput.files?.[0]) {
        return;
      }

      try {
        if (activeEditor === "sponsors") {
          readSponsorsFromDom();
          const action = fileInput.dataset.action;
          const path = await uploadFileTo(fileInput.files[0], "sponsors", action === "upload-sponsor-hero" ? "hero" : "logos");

          if (action === "upload-sponsor-hero") {
            sponsorsData.heroImage = path;
          }

          if (action === "upload-sponsor-logo") {
            sponsorsData.items[Number(fileInput.dataset.sponsorIndex)].logo = path;
          }

          renderSponsorsEditor();
          setStatus("이미지를 업로드했습니다. 저장을 눌러 반영하세요.", "success");
          return;
        }

        if (isHomeEditor()) {
          readHomeFromDom();
          const action = fileInput.dataset.action;
          const category = activeEditor === "home-en" ? "home-en" : "home";
          const bucket =
            action === "upload-home-hero-light" || action === "upload-home-hero-dark"
              ? "hero"
              : action === "upload-home-card"
                ? "cards"
                : "contact";
          const path = await uploadFileTo(fileInput.files[0], category, bucket);

          if (action === "upload-home-hero-light") {
            homeData.hero.lightImage = path;
          }
          if (action === "upload-home-hero-dark") {
            homeData.hero.darkImage = path;
          }
          if (action === "upload-home-card") {
            homeData.cards[Number(fileInput.dataset.cardIndex)].image = path;
          }
          if (action === "upload-home-photo") {
            homeData.contact.photos[Number(fileInput.dataset.photoIndex)].image = path;
          }

          renderHomeEditor();
          setStatus("이미지를 업로드했습니다. 저장을 눌러 반영하세요.", "success");
          return;
        }

        if (isIntroEditor()) {
          readIntroFromDom();
          const category = activeEditor === "intro-en" ? "intro-en" : "intro";
          const path = await uploadFileTo(fileInput.files[0], category, "organization");
          introData.organization.image = path;
          renderIntroEditor();
          setStatus("이미지를 업로드했습니다. 저장을 눌러 반영하세요.", "success");
          return;
        }

        if (activeEditor === "history") {
          readHistoryFromDom();
          const path = await uploadFileTo(fileInput.files[0], "history", "vehicles");
          const group = historyData.groups[Number(fileInput.dataset.groupIndex)];
          const vehicle = group?.vehicles[Number(fileInput.dataset.vehicleIndex)];
          if (vehicle) {
            vehicle.image = path;
          }

          renderHistoryEditor();
          setStatus("이미지를 업로드했습니다. 저장을 눌러 반영하세요.", "success");
          return;
        }

        if (activeEditor === "contact") {
          readContactFromDom();
          const action = fileInput.dataset.action;
          const path = await uploadFileTo(fileInput.files[0], "contact", action === "upload-contact-hero" ? "hero" : "socials");

          if (action === "upload-contact-hero") {
            contactData.heroImage = path;
          }

          if (action === "upload-contact-social") {
            contactData.socials[Number(fileInput.dataset.socialIndex)].image = path;
          }

          renderContactEditor();
          setStatus("이미지를 업로드했습니다. 저장을 눌러 반영하세요.", "success");
          return;
        }

        readCurrentEditorFromDom();
        const kind = selectedKind();
        const season = currentSeason();
        const path = await uploadFile(fileInput.files[0], selectedUploadBucket());

        if (fileInput.dataset.action === "upload-team-photo") {
          if (kind === "ob") {
            membersData.ob.teamPhotos[Number(fileInput.dataset.photoIndex)] = path;
          } else if (season) {
            season.teamPhotos[Number(fileInput.dataset.photoIndex)] = path;
          }
        }

        if (fileInput.dataset.action === "upload-member-photo") {
          const section = season.sections[Number(fileInput.dataset.sectionIndex)];
          const group = section.groups[Number(fileInput.dataset.groupIndex)];
          const member = group.members[Number(fileInput.dataset.memberIndex)];
          member.photo = path;
        }

        if (fileInput.dataset.action === "upload-ob-member-photo") {
          const member = membersData.ob.members[Number(fileInput.dataset.memberIndex)];
          member.photo = path;
        }

        if (fileInput.dataset.action === "upload-archive-photo") {
          const group = membersData.archive.groups[Number(fileInput.dataset.groupIndex)];
          group.photos[Number(fileInput.dataset.photoIndex)] = path;
        }

        renderEditor();
        setStatus("이미지를 업로드했습니다. 저장을 눌러 반영하세요.", "success");
      } catch (error) {
        setStatus(error.message, "error");
      }
    });

    const showPageList = async () => {
      sitePages = (await requestJson("/api/admin/pages")).map(normalizePage);
      visitsData = normalizeVisitsData(await requestJson("/api/admin/visits"));
      renderPageList();
      loginPanel.hidden = true;
      adminPages.hidden = false;
      adminEditor.hidden = true;
      setStatus("");
    };

    const loadMembersEditor = async () => {
      setEditorChrome("members");
      membersData = normalizeData(await requestJson("/api/members"));
      sortSeasons();
      selectedYear = membersData.seasons[0] ? `season:${membersData.seasons[0].year}` : "archive";
      loginPanel.hidden = true;
      adminPages.hidden = true;
      adminEditor.hidden = false;
      renderEditor();
      setStatus("");
    };

    const loadHomeEditor = async (editor = "home") => {
      setEditorChrome(editor);
      homeData = normalizeHomeData(await requestJson(homeApiPath()));
      loginPanel.hidden = true;
      adminPages.hidden = true;
      adminEditor.hidden = false;
      renderHomeEditor();
      setStatus("");
    };

    const loadIntroEditor = async (editor = "intro") => {
      setEditorChrome(editor);
      introData = normalizeIntroData(await requestJson(introApiPath()));
      loginPanel.hidden = true;
      adminPages.hidden = true;
      adminEditor.hidden = false;
      renderIntroEditor();
      setStatus("");
    };

    const loadHistoryEditor = async () => {
      setEditorChrome("history");
      historyData = normalizeHistoryData(await requestJson("/api/history"));
      loginPanel.hidden = true;
      adminPages.hidden = true;
      adminEditor.hidden = false;
      renderHistoryEditor();
      setStatus("");
    };

    const loadSponsorsEditor = async () => {
      setEditorChrome("sponsors");
      sponsorsData = normalizeSponsorsData(await requestJson("/api/sponsors"));
      loginPanel.hidden = true;
      adminPages.hidden = true;
      adminEditor.hidden = false;
      renderSponsorsEditor();
      setStatus("");
    };

    const loadContactEditor = async () => {
      setEditorChrome("contact");
      contactData = normalizeContactData(await requestJson("/api/contact"));
      loginPanel.hidden = true;
      adminPages.hidden = true;
      adminEditor.hidden = false;
      renderContactEditor();
      setStatus("");
    };

    const init = async () => {
      try {
        const session = await requestJson("/api/admin/session");
        if (session.authenticated) {
          await showPageList();
        }
      } catch {
        loginPanel.hidden = false;
      }
    };

    init();
  </script>  </main> <footer class="site-footer"> <div class="container footer-inner"> <span>ⓒ 2026 Tachyon</span> <div class="footer-social"> <a href="https://www.instagram.com/cbnu_tachyon/"> <svg viewBox="0 0 24 24" aria-hidden="true"> <path d="M7.5 2C4.462 2 2 4.462 2 7.5v9C2 19.538 4.462 22 7.5 22h9c3.038 0 5.5-2.462 5.5-5.5v-9C22 4.462 19.538 2 16.5 2h-9zm0 2h9C18.43 4 20 5.57 20 7.5v9c0 1.93-1.57 3.5-3.5 3.5h-9C5.57 20 4 18.43 4 16.5v-9C4 5.57 5.57 4 7.5 4zm9.25 2a1.25 1.25 0 100 2.5 1.25 1.25 0 000-2.5zM12 7a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6z"></path> </svg>
