mpetition":"Formula SAE","award":"금상 (Gold Prize)","image":"/images/vehicles/TF2.jpg","alt":"TF-2"},{"name":"TF-1","year":"2006","competition":"Formula SAE","award":"베스트 루키상 (Best Rookie Award)","image":"/images/vehicles/TF1.jpg","alt":"TF-1"}]},{"title":"TE Series","vehicles":[{"name":"TE-7","year":"2024","competition":"스마트 e-모빌리티 경진대회","award":"","image":"/images/vehicles/TE-7.jpg","alt":"TE-7"},{"name":"TE-6","year":"2023","competition":"스마트 e-모빌리티 경진대회","award":"장려상 (Encouragement Award)","image":"/images/vehicles/TE-6.jpg","alt":"TE-6"},{"name":"TE-5","year":"2022","competition":"스마트 e-모빌리티 경진대회","award":"5위(동상)","image":"/images/vehicles/TE-5.jpg","alt":"TE-5"},{"name":"TE-3L","year":"2021","competition":"스마트 e-모빌리티 경진대회","award":"","image":"/images/vehicles/TE-3L.jpg","alt":"TE-3"},{"name":"TE-3","year":"2020","competition":"스마트 e-모빌리티 경진대회","award":"","image":"/images/vehicles/TE-3.JPG","alt":"TE-3"}]},{"title":"T Series","vehicles":[{"name":"T-8","year":"2014","competition":"KSAE Formula","award":"장려상 (Encouragement Award)","image":"/images/vehicles/T8.jpg","alt":"T-8"},{"name":"T-7","year":"2004","competition":"KSAE Formula","award":"","image":"/images/vehicles/T7.jpg","alt":"T-7"},{"name":"T-6","year":"2003","competition":"KSAE Formula","award":"","image":"/images/vehicles/T6.bmp","alt":"T-6"},{"name":"T-5","year":"2002","competition":"KSAE Formula","award":"","image":"/images/vehicles/T5.jpg","alt":"T-5"},{"name":"T-4","year":"2001","competition":"KSAE Formula","award":"","image":"/images/vehicles/T4.jpg","alt":"T-4"},{"name":"T-3","year":"2000","competition":"KSAE Formula","award":"","image":"/images/vehicles/T3.jpg","alt":"T-3"},{"name":"T-2","year":"1999","competition":"KSAE Formula","award":"","image":"/images/vehicles/T2.jpg","alt":"T-2"},{"name":"T-1","year":"1998","competition":"KSAE Formula","award":"","image":"/images/vehicles/T1.jpg","alt":"T-1"}]},{"title":"TM Series","vehicles":[{"name":"TM-3","year":"2013","competition":"Baja Student Korea","award":"","image":"/images/vehicles/TM3.jpg","alt":"TM-3"},{"name":"TM-2","year":"2012","competition":"Baja Student Korea","award":"","image":"/images/vehicles/TM2.jpg","alt":"TM-2"},{"name":"TM-1","year":"2011","competition":"Baja Student Korea","award":"","image":"/images/vehicles/TM1.jpg","alt":"TM-1"}]}],"awards":{"title":"역대 수상 내역","items":[{"year":"2025","competition":"Formula Student Korea (FSK)","vehicle":"TF-25","result":"에너지 효율 우수상 (Energy Efficiency Award)"},{"year":"2025","competition":"스마트 e-모빌리티 경진대회","vehicle":"TE-6","result":"장려상 (Encouragement Award)"},{"year":"2024","competition":"Formula Student Korea (C-Formula)","vehicle":"RTF-1","result":"종합 9위(장려상)"},{"year":"2024","competition":"스마트 e-모빌리티 경진대회","vehicle":"TE-5","result":"5위(동상)"},{"year":"2023","competition":"스마트 e-모빌리티 경진대회","vehicle":"TE-5","result":"종합 12위(장려상)"},{"year":"2023","competition":"스마트 e-모빌리티 경진대회","vehicle":"TE-3L","result":"종합 9위(장려상)"},{"year":"2014","competition":"K-SAE Formula","vehicle":"T-8","result":"장려상 (Encouragement Award)"},{"year":"2012","competition":"K-SAE Formula","vehicle":"TF-2","result":"금상 (Gold Prize)"},{"year":"2010","competition":"Formula SAE","vehicle":"TF-2","result":"종합 20위 (20th Overall)"},{"year":"2006","competition":"Formula SAE","vehicle":"TF-1","result":"베스트 루키상 (Best Rookie Award)"}]}};

    const app = document.getElementById("history-app");

    const escapeHtml = (value) =>
      String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

    const normalizeHistory = (data) => ({
      title: data?.title || "Our Cars",
      description: data?.description || "",
      vehicleSectionTitle: data?.vehicleSectionTitle || "History",
      groups: Array.isArray(data?.groups) ? data.groups : [],
      awards: {
        title: data?.awards?.title || "역대 수상 내역",
        items: Array.isArray(data?.awards?.items) ? data.awards.items : [],
      },
    });

    const vehicleCard = (vehicle) => {
      const image = vehicle.image
        ? `<img src="${escapeHtml(vehicle.image)}" alt="${escapeHtml(vehicle.alt || vehicle.name)}">`
        : "";
      const year = vehicle.year ? `<p class="history-card-year">제작: ${escapeHtml(vehicle.year)}</p>` : "";
      const competition = vehicle.competition
        ? `<p class="history-card-result">참여 대회: ${escapeHtml(vehicle.competition)}</p>`
        : "";
      const award = vehicle.award ? `<p class="history-card-result">수상: ${escapeHtml(vehicle.award)}</p>` : "";

      return `
        <article class="history-card">
          ${image}
          <div class="history-card-body">
            <h4 class="history-card-title">${escapeHtml(vehicle.name)}</h4>
            ${year}
            ${competition}
            ${award}
          </div>
        </article>
      `;
    };

    const historyGroup = (group) => `
      <div class="history-group">
        <h3 class="history-group-title">${escapeHtml(group.title)}</h3>
        <div class="history-cards">${(group.vehicles || []).map(vehicleCard).join("")}</div>
      </div>
    `;

    const awardRow = (item) => `
      <tr>
        <td>${escapeHtml(item.year)}</td>
        <td>${escapeHtml(item.competition)}</td>
        <td>${escapeHtml(item.vehicle)}</td>
        <td>${escapeHtml(item.result)}</td>
      </tr>
    `;

    const render = (data) => {
      const history = normalizeHistory(data);
      document.title = history.title;
      document.querySelector('meta[name="description"]')?.setAttribute("content", history.description);

      app.innerHTML = `
        <h2 class="section-title">${escapeHtml(history.vehicleSectionTitle)}</h2>
        ${history.groups.map(historyGroup).join("")}
      `;

      const awardsSection = document.getElementById("awards-app");
      if (awardsSection) {
        awardsSection.innerHTML = `
          <h2 class="section-title">${escapeHtml(history.awards.title)}</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>연도</th>
                  <th>대회</th>
                  <th>차량</th>
                  <th>성과</th>
                </tr>
              </thead>
              <tbody>${history.awards.items.map(awardRow).join("")}</tbody>
            </table>
          </div>
        `;
      }
    };

    const loadHistory = async () => {
      try {
        const response = await fetch("/api/history", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Failed to load history");
        }
        return await response.json();
      } catch {
        return fallbackHistoryData;
      }
    };

    const start = () => loadHistory().then(render).catch(() => render(fallbackHistoryData));
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", start, { once: true });
    } else {
      start();
    }
  })();</script> <section class="section" id="awards"> <div class="container" id="awards-app"></div> </section>  </main> <footer class="site-footer"> <div class="container footer-inner"> <span>ⓒ 2026 Tachyon</span> <div class="footer-social"> <a href="https://www.instagram.com/cbnu_tachyon/"> <svg viewBox="0 0 24 24" aria-hidden="true"> <path d="M7.5 2C4.462 2 2 4.462 2 7.5v9C2 19.538 4.462 22 7.5 22h9c3.038 0 5.5-2.462 5.5-5.5v-9C22 4.462 19.538 2 16.5 2h-9zm0 2h9C18.43 4 20 5.57 20 7.5v9c0 1.93-1.57 3.5-3.5 3.5h-9C5.57 20 4 18.43 4 16.5v-9C4 5.57 5.57 4 7.5 4zm9.25 2a1.25 1.25 0 100 2.5 1.25 1.25 0 000-2.5zM12 7a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6z"></path> </svg>
