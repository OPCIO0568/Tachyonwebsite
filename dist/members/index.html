,{"title":"Aero","groups":[{"title":"","members":[{"name":"최상건","role":"Aero","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"신승우","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"어윤호","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"이정우","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"이준현","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"정다인","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"조상영","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"최우찬","role":"","email":"","photo":"/images/profile/unprofile.jpg"}]}]},{"title":"Chassis","groups":[{"title":"Frame","members":[{"name":"김수현","role":"Frame","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"주재석","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"강민균","role":"","email":"","photo":"/images/profile/unprofile.jpg"}]},{"title":"Suspension","members":[{"name":"강민균","role":"Geometry","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"김가은","role":"Component","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"유시현","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"이은서","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"정준호","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"김재휘","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"윤희범","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"박노민","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"조준연","role":"","email":"","photo":"/images/profile/unprofile.jpg"}]},{"title":"Brake","members":[{"name":"김상현","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"윤정근","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"최형준","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"추민균","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"김정욱","role":"","email":"","photo":"/images/profile/unprofile.jpg"}]},{"title":"Steering","members":[{"name":"김성욱","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"정의호","role":"","email":"","photo":"/images/profile/unprofile.jpg"}]}]},{"title":"PT","groups":[{"title":"Engine","members":[{"name":"김강회","role":"Engine","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"김태완","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"김윤서","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"이우신","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"장재용","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"장혜원","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"전주은","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"한상민","role":"","email":"","photo":"/images/profile/unprofile.jpg"}]},{"title":"Intake","members":[{"name":"이정현","role":"Intake","email":"","photo":"/images/profile/unprofile.jpg"}]},{"title":"Exhaust","members":[{"name":"원강식","role":"Exhaust","email":"","photo":"/images/profile/unprofile.jpg"}]},{"title":"Cooling System","members":[{"name":"김도원","role":"","email":"","photo":"/images/profile/unprofile.jpg"}]},{"title":"Electronic","members":[{"name":"이윤재","role":"Electronic","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"김건우","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"이승준","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"곽내영","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"김민경","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"문다빈","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"송승언","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"안효진","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"윤희선","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"임예인","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"전은서","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"고지민","role":"","email":"","photo":"/images/profile/unprofile.jpg"}]}]},{"title":"Media","groups":[{"title":"","members":[{"name":"고동현","role":"","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"최민서","role":"","email":"","photo":"/images/profile/unprofile.jpg"}]}]}]},{"year":"2025","title":"Members 2025","subtitle":"Tachyon Season 2025.","teamPhotos":["/images/profile/2025/2025-1.jpg","/images/profile/2025/2025-2.jpg","/images/profile/2025/2025.JPG"],"sections":[]},{"year":"2024","title":"Members 2024","subtitle":"Tachyon Season 2024.","teamPhotos":["/images/profile/2024/2024_1.jpg","/images/profile/2024/2024_2.jpg"],"sections":[]}],"archive":{"title":"Members Archive","subtitle":"2022-2023 team photos.","groups":[{"label":"2023","photos":["/images/profile/archive/2023-1.jpg","/images/profile/archive/2023-2.jpg"]},{"label":"2022","photos":["/images/profile/archive/2022.jpg"]}]},"ob":{"title":"OB Members","subtitle":"OB","teamPhotos":[],"members":[{"name":"이름 입력","role":"OB","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"이름 입력","role":"OB","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"이름 입력","role":"OB","email":"","photo":"/images/profile/unprofile.jpg"},{"name":"이름 입력","role":"OB","email":"","photo":"/images/profile/unprofile.jpg"}]}};

    const app = document.getElementById("members-app");
    const fallbackPhoto = "/images/profile/unprofile.jpg";

    const escapeHtml = (value) =>
      String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

    const normalizeEmail = (email) => String(email ?? "").trim();

    const sortSeasons = (seasons) =>
      [...(seasons ?? [])].sort((a, b) => Number(b.year) - Number(a.year));

    const getInitialView = (data) => {
      const params = new URLSearchParams(window.location.search);
      const pathMatch = window.location.pathname.match(/^\/members\/([^/]+)\/?$/);
      const pathView = pathMatch?.[1];
      const year = pathView || params.get("year");

      if (year && data.seasons?.some((season) => season.year === year)) {
        return { type: "season", year };
      }
      if (pathView === "archive" || params.get("view") === "archive") {
        return { type: "archive" };
      }
      if (pathView === "ob" || params.get("view") === "ob") {
        return { type: "ob" };
      }
      return { type: "season", year: sortSeasons(data.seasons)[0]?.year };
    };

    const renderTabs = (data, active) => {
      const seasonTabs = sortSeasons(data.seasons)
        .map((season) => {
          const activeClass = active.type === "season" && active.year === season.year ? " is-active" : "";
          return `<button class="member-tab${activeClass}" type="button" data-year="${escapeHtml(season.year)}">${escapeHtml(season.year)}</button>`;
        })
        .join("");

      const archiveClass = active.type === "archive" ? " is-active" : "";
      const obClass = active.type === "ob" ? " is-active" : "";

      return `
        <div class="member-tabs" role="tablist">
          ${seasonTabs}
          <button class="member-tab${archiveClass}" type="button" data-view="archive">Archive</button>
          <button class="member-tab${obClass}" type="button" data-view="ob">OB</button>
        </div>
      `;
    };

    const renderTeamPhotos = (photos, alt) => {
      if (!photos?.length) {
        return "";
      }

      return photos
        .map(
          (photo) => `
            <div class="member-hero">
              <img class="member-hero-photo" src="${escapeHtml(photo)}" alt="${escapeHtml(alt)}">
            </div>
          `,
        )
        .join("");
    };

    const renderMember = (member) => {
      const email = normalizeEmail(member.email);
      const emailButton = email
        ? `<button class="member-link member-email-copy" type="button" data-email="${escapeHtml(email)}" aria-label="${escapeHtml(`${email} copy`)}">Email</button>`
        : "";

      return `
        <article class="member-card">
          <img class="member-photo" src="${escapeHtml(member.photo || fallbackPhoto)}" alt="${escapeHtml(member.name || member.role || "Member")}">
          <h3 class="member-name">${escapeHtml(member.name || "이름 입력")}</h3>
          <p class="member-role">${escapeHtml(member.role || "")}</p>
          ${emailButton}
        </article>
      `;
    };

    const renderSections = (sections) => {
      if (!sections?.length) {
        return "";
      }

      return sections
        .map((section) => {
          const groups = (section.groups ?? [])
            .map((group) => {
              const title = group.title
                ? `<h3 class="member-subtitle">${escapeHtml(group.title)}</h3>`
                : "";
              const members = (group.members ?? []).map(renderMember).join("");
              return `
                ${title}
                <div class="member-grid">${members}</div>
              `;
            })
            .join("");

          return `
            <div class="member-section">
              <h2 class="member-section-title">${escapeHtml(section.title)}</h2>
              ${groups}
            </div>
          `;
        })
        .join("");
    };

    const renderSeason = (data, year) => {
      const season = data.seasons?.find((item) => item.year === year) ?? sortSeasons(data.seasons)[0];
      if (!season) {
        return `
          <h1 class="section-title">Members</h1>
          <p class="section-subtitle">등록된 시즌이 없습니다.</p>
        `;
      }

      return `
        <h1 class="section-title">${escapeHtml(season.title || `Members ${season.year}`)}</h1>
        <p class="section-subtitle">${escapeHtml(season.subtitle || "")}</p>
        ${renderTabs(data, { type: "season", year: season.year })}
        ${renderTeamPhotos(season.teamPhotos, `Tachyon Team ${season.year}`)}
        ${renderSections(season.sections)}
      `;
    };

    const renderArchive = (data) => {
      const groups = data.archive?.groups ?? [];
      const archiveGroups = groups
        .map(
          (group) => `
            <h2 class="member-section-title">${escapeHtml(group.label)}</h2>
            ${renderTeamPhotos(group.photos, `Tachyon Team ${group.label}`)}
          `,
        )
        .join("");

      return `
        <h1 class="section-title">${escapeHtml(data.archive?.title || "Members Archive")}</h1>
        <p class="section-subtitle">${escapeHtml(data.archive?.subtitle || "")}</p>
        ${renderTabs(data, { type: "archive" })}
        ${archiveGroups}
      `;
    };

    const renderOb = (data) => `
      <h1 class="section-title">${escapeHtml(data.ob?.title || "OB Members")}</h1>
      <p class="section-subtitle">${escapeHtml(data.ob?.subtitle || "")}</p>
      ${renderTabs(data, { type: "ob" })}
      ${renderTeamPhotos(data.ob?.teamPhotos, "Tachyon OB Team")}
      <div class="member-grid">${(data.ob?.members ?? []).map(renderMember).join("")}</div>
    `;

    const render = (data, view) => {
      if (view.type === "archive") {
        app.innerHTML = renderArchive(data);
      } else if (view.type === "ob") {
        app.innerHTML = renderOb(data);
      } else {
        app.innerHTML = renderSeason(data, view.year);
      }
    };

    const setUrl = (view) => {
      const url = new URL(window.location.href);
      url.search = "";
      if (view.type === "season" && view.year) {
        url.pathname = `/members/${view.year}`;
      } else if (view.type === "archive" || view.type === "ob") {
        url.pathname = `/members/${view.type}`;
      } else {
        url.pathname = "/members";
      }
      window.history.pushState(view, "", url);
    };

    const loadMembersData = async () => {
      try {
        const response = await fetch("/api/members", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Failed to load members");
        }
        return await response.json();
      } catch {
        return fallbackMembersData;
      }
    };

    const copyToClipboard = async (text) => {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      document.body.append(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
    };

    const showCopyState = (button, label, className) => {
      const originalLabel = button.dataset.label || button.textContent;
      button.dataset.label = originalLabel;
      button.textContent = label;
      button.classList.add(className);

      window.setTimeout(() => {
        button.textContent = originalLabel;
        button.classList.remove(className);
      }, 1400);
    };

    const init = async () => {
      try {
        const data = await loadMembersData();
        let active = getInitialView(data);
        render(data, active);

        app.addEventListener("click", async (event) => {
          const emailButton = event.target.closest(".member-email-copy");
          if (emailButton) {
            try {
              await copyToClipboard(emailButton.dataset.email || "");
              showCopyState(emailButton, "Copied", "is-copied");
            } catch {
              showCopyState(emailButton, "Failed", "is-copy-failed");
            }
            return;
          }

          const tab = event.target.closest(".member-tab");
          if (!tab) {
            return;
          }

          active = tab.dataset.year
            ? { type: "season", year: tab.dataset.year }
            : { type: tab.dataset.view };
          render(data, active);
          setUrl(active);
        });

        window.addEventListener("popstate", () => {
          active = getInitialView(data);
          render(data, active);
        });
      } catch {
        app.innerHTML = `
          <h1 class="section-title">Members</h1>
          <p class="section-subtitle">멤버 정보를 표시하지 못했습니다. 데이터 형식을 확인해주세요.</p>
        `;
      }
    };

    init();
  })();</script>  </main> <footer class="site-footer"> <div class="container footer-inner"> <span>ⓒ 2026 Tachyon</span> <div class="footer-social"> <a href="https://www.instagram.com/cbnu_tachyon/"> <svg viewBox="0 0 24 24" aria-hidden="true"> <path d="M7.5 2C4.462 2 2 4.462 2 7.5v9C2 19.538 4.462 22 7.5 22h9c3.038 0 5.5-2.462 5.5-5.5v-9C22 4.462 19.538 2 16.5 2h-9zm0 2h9C18.43 4 20 5.57 20 7.5v9c0 1.93-1.57 3.5-3.5 3.5h-9C5.57 20 4 18.43 4 16.5v-9C4 5.57 5.57 4 7.5 4zm9.25 2a1.25 1.25 0 100 2.5 1.25 1.25 0 000-2.5zM12 7a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6z"></path> </svg>
