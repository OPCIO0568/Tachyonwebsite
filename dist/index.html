</p> </div> </section> </div> <script>(function(){const fallbackHomeData = {"title":"Tachyon","description":"충북대학교 자작 포뮬러 자동차 동아리","hero":{"lightImage":"/images/banner.jpg","darkImage":"/images/banner-dark.jpg","alt":"Tachyon Banner","title":"충북대학교 자작 자동차 동아리, TACHYON","lead":"차량의 구조와 작동 원리를 직접 이해하고, 설계부터 제작, 테스트 주행까지 전 과정을 직접 대학생들이 하는 것을 목표로 활동하고 있습니다."},"cards":[{"label":"About US","href":"/intro","image":"/images/photo/us.jpg","alt":"동아리 소개"},{"label":"Our Cars","href":"/history","image":"/images/photo/cont.jpg","alt":"동아리 역사"},{"label":"Sponsors","href":"/sponsors","image":"/images/photo/spon.jpg","alt":"스폰서"}],"contact":{"title":"With US","photos":[{"href":"http://www.youtube.com/@CBNUTACHYON/","image":"/images/photo/youbu.jpg","alt":"YouTube"},{"href":"https://www.instagram.com/cbnu_tachyon/","image":"/images/photo/insat.jpg","alt":"Instagram"}],"links":[{"label":"Instagram","href":"https://www.instagram.com/cbnu_tachyon/"},{"label":"Naver Cafe","href":"https://cafe.naver.com/tachyonformula/"},{"label":"YouTube","href":"http://www.youtube.com/@CBNUTACHYON/"},{"label":"Email Us","href":"/contact"}]}};

    const app = document.getElementById("home-app");

    const escapeHtml = (value) =>
      String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

    const normalizeHome = (data) => ({
      title: data?.title || "Tachyon",
      description: data?.description || "",
      hero: {
        lightImage: data?.hero?.lightImage || "",
        darkImage: data?.hero?.darkImage || "",
        alt: data?.hero?.alt || "Tachyon Banner",
        title: data?.hero?.title || "",
        lead: data?.hero?.lead || "",
      },
      cards: Array.isArray(data?.cards) ? data.cards : [],
      contact: {
        title: data?.contact?.title || "With US",
        photos: Array.isArray(data?.contact?.photos) ? data.contact.photos : [],
        links: Array.isArray(data?.contact?.links) ? data.contact.links : [],
      },
    });

    const renderCard = (card) => `
      <a class="card" href="${escapeHtml(card.href || "#")}">
        <img src="${escapeHtml(card.image)}" alt="${escapeHtml(card.alt || card.label)}">
        <span class="label">${escapeHtml(card.label)}</span>
      </a>
    `;

    const renderContactPhoto = (photo) => `
      <div class="contact-panel">
        <a class="contact-photo-link" href="${escapeHtml(photo.href || "#")}">
          <img class="contact-photo" src="${escapeHtml(photo.image)}" alt="${escapeHtml(photo.alt)}">
        </a>
      </div>
    `;

    const renderContactLink = (link) => `
      <a class="contact-btn" href="${escapeHtml(link.href || "#")}">${escapeHtml(link.label)}</a>
    `;

    const render = (data) => {
      const home = normalizeHome(data);
      document.title = home.title;
      document.querySelector('meta[name="description"]')?.setAttribute("content", home.description);
      const darkSource = home.hero.darkImage
        ? `<source srcset="${escapeHtml(home.hero.darkImage)}" media="(prefers-color-scheme: dark)">`
        : "";

      app.innerHTML = `
        <section class="hero">
          <picture>
            ${darkSource}
            <img src="${escapeHtml(home.hero.lightImage)}" alt="${escapeHtml(home.hero.alt)}">
          </picture>
          <div class="container hero-content">
            <h1 class="hero-title">${escapeHtml(home.hero.title)}</h1>
            <p class="hero-lead">${escapeHtml(home.hero.lead)}</p>
          </div>
        </section>

        <section class="section">
          <div class="container">
            <h2 class="section-title"></h2>
            <div class="card-grid">${home.cards.map(renderCard).join("")}</div>
          </div>
        </section>

        <section class="section" id="contact">
          <div class="container">
            <h2 class="section-title">${escapeHtml(home.contact.title)}</h2>
            <div class="contact-grid">
              ${home.contact.photos.map(renderContactPhoto).join("")}
              <div class="contact-panel contact-buttons">
                ${home.contact.links.map(renderContactLink).join("")}
              </div>
            </div>
          </div>
        </section>
      `;
    };

    const loadHome = async () => {
      try {
        const response = await fetch("/api/home", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Failed to load home");
        }
        return await response.json();
      } catch {
        return fallbackHomeData;
      }
    };

    loadHome().then(render).catch(() => render(fallbackHomeData));
  })();</script>  </main> <footer class="site-footer"> <div class="container footer-inner"> <span>ⓒ 2026 Tachyon</span> <div class="footer-social"> <a href="https://www.instagram.com/cbnu_tachyon/"> <svg viewBox="0 0 24 24" aria-hidden="true"> <path d="M7.5 2C4.462 2 2 4.462 2 7.5v9C2 19.538 4.462 22 7.5 22h9c3.038 0 5.5-2.462 5.5-5.5v-9C22 4.462 19.538 2 16.5 2h-9zm0 2h9C18.43 4 20 5.57 20 7.5v9c0 1.93-1.57 3.5-3.5 3.5h-9C5.57 20 4 18.43 4 16.5v-9C4 5.57 5.57 4 7.5 4zm9.25 2a1.25 1.25 0 100 2.5 1.25 1.25 0 000-2.5zM12 7a5 5 0 100 10 5 5 0 000-10zm0 2a3 3 0 110 6 3 3 0 010-6z"></path> </svg>
